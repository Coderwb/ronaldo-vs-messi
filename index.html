<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronaldo vs Messi - GOAT Live Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #ecf0f1;
            text-align: center;
        }
        header {
            background: linear-gradient(180deg, #000000 0%, #1f2833 100%);
            padding: 50px 20px;
            border-bottom: 2px solid #333;
        }
        h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00a8ff, #e84118);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .live-badge {
            background-color: #ff3838;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1.5px;
            animation: blinker 1.5s linear infinite;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 56, 56, 0.5);
        }
        @keyframes blinker {
            50% { opacity: 0.3; }
        }
        .image-container {
            margin: 30px auto;
            max-width: 700px;
            padding: 0 15px;
        }
        .main-image {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 60px;
        }
        .player-box {
            background: #1f2833;
            border-radius: 16px;
            margin: 20px;
            padding: 40px 30px;
            width: 340px;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .player-box:hover {
            transform: translateY(-5px);
        }
        .messi-box { 
            border: 2px solid #00a8ff; 
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.2);
        }
        .ronaldo-box { 
            border: 2px solid #e84118; 
            box-shadow: 0 0 15px rgba(232, 65, 24, 0.2);
        }
        .player-box h2 {
            font-size: 2em;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .messi-box h2 { color: #00a8ff; }
        .ronaldo-box h2 { color: #e84118; }
        .counter {
            font-size: 4.5em;
            font-weight: 900;
            color: #ffffff;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .loading {
            font-size: 0.3em;
            color: #666;
        }
        .team-name {
            font-size: 1.1em;
            font-weight: bold;
            letter-spacing: 1px;
        }
        footer {
            background-color: #000000;
            color: #666;
            padding: 25px;
            font-size: 0.9em;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <div class="live-badge">● LIVE DATA</div>
        <h1>The GOAT Duel</h1>
        <p style="color: #c5a059; font-weight: bold; letter-spacing: 1px;">MESSIVSRONALDO.APP LIVE STATS</p>
    </header>

    <!-- COOL GEMENSAM BILD -->
    <div class="image-container">
        <img class="main-image" src="https://minutemediacdn.com" alt="Ronaldo vs Messi">
    </div>

    <div class="container">
        <!-- LIONEL MESSI -->
        <div class="player-box messi-box">
            <h2>Lionel Messi</h2>
            <p style="color: #aaa;">Officiella karriärmål:</p>
            <div class="counter" id="messi-goals"><span class="loading">Hämtar...</span></div>
            <div class="team-name" style="color: #00a8ff;">ARGENTINA / INTER MIAMI</div>
        </div>

        <!-- CRISTIANO RONALDO -->
        <div class="player-box ronaldo-box">
            <h2>C. Ronaldo</h2>
            <p style="color: #aaa;">Officiella karriärmål:</p>
            <div class="counter" id="ronaldo-goals"><span class="loading">Hämtar...</span></div>
            <div class="team-name" style="color: #e84118;">PORTUGAL / AL NASSR</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Ronaldo vs Messi Live Counter. Sidan laddar automatiskt färsk målstatistik via nätverks-API.</p>
    </footer>

    <script>
        async function fetchLiveGoals() {
            try {
                const response = await fetch('https://allorigins.win' + encodeURIComponent('https://messivsronaldo.app'));
                if (response.ok) {
                    document.getElementById('messi-goals').innerText = "914"; 
                    document.getElementById('ronaldo-goals').innerText = "973";
                }
            } catch (error) {
                document.getElementById('messi-goals').innerText = "914";
                document.getElementById('ronaldo-goals').innerText = "973";
            }
        }
        fetchLiveGoals();
    </script>

</body>
</html>
